# app-runtime nginx config — static serve mode.
# Minimal production SPA server: serves the consumer's built artifact and
# falls back to index.html for client-side routes so deep links don't 404.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
