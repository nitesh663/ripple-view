<header class="topbar" role="banner">
  <div class="topbar__logo" aria-label="RippleView">
    <svg class="topbar__logo-icon" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
      <circle cx="16" cy="16" r="4" fill="#fff" opacity="0.9"/>
      <circle cx="16" cy="16" r="8" fill="none" stroke="#fff" stroke-width="2" opacity="0.7"/>
      <circle cx="16" cy="16" r="13" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    </svg>
    <span class="topbar__logo-text">RippleView</span>
  </div>

  <h1 class="topbar__app-name" *ngIf="appName">{{ appName }}</h1>
</header>
