<div class="op-viewer">
  <h2 class="op-viewer__heading">
    <i class="pi pi-chevron-circle-down"></i> {{ 'NAV.DROPDOWN' | translate }}
  </h2>

  <div class="op-viewer__grid">
    <!-- Preview -->
    <section class="op-panel op-viewer__preview">
      <h3 class="op-section-title">{{ 'COMMON.PREVIEW' | translate }}</h3>
      <op-cc-dropdown
        [control]="control"
        [options]="options"
        [label]="label"
        [placeholder]="placeholder"
        [isFilter]="isFilter"
        [showClear]="showClear"
        [sortAlphabetically]="sortAlphabetically"
        [disabled]="disabled"
        [isMandatory]="isMandatory"
        [floating]="floating"
      ></op-cc-dropdown>

      <div class="op-viewer__value">
        <strong>{{ 'COMMON.VALUE' | translate }}:</strong>
        <code>{{ control.value | json }}</code>
      </div>
    </section>

    <!-- Properties -->
    <section class="op-panel op-viewer__props">
      <h3 class="op-section-title">{{ 'COMMON.PROPERTIES' | translate }}</h3>

      <label class="op-field">
        <span>{{ 'COMMON.LABEL' | translate }}</span>
        <input type="text" [(ngModel)]="label" />
      </label>

      <label class="op-field">
        <span>{{ 'COMMON.PLACEHOLDER' | translate }}</span>
        <input type="text" [(ngModel)]="placeholder" />
      </label>

      <label class="op-check">
        <input type="checkbox" [(ngModel)]="disabled" /> {{ 'COMMON.DISABLED' | translate }}
      </label>
      <label class="op-check">
        <input type="checkbox" [(ngModel)]="isMandatory" /> {{ 'COMMON.MANDATORY' | translate }}
      </label>
      <label class="op-check">
        <input type="checkbox" [(ngModel)]="floating" /> {{ 'COMMON.FLOATING' | translate }}
      </label>
      <label class="op-check"><input type="checkbox" [(ngModel)]="isFilter" /> Filter</label>
      <label class="op-check"><input type="checkbox" [(ngModel)]="showClear" /> Show clear</label>
      <label class="op-check">
        <input type="checkbox" [(ngModel)]="sortAlphabetically" /> Sort alphabetically
      </label>
    </section>
  </div>

  <section class="op-panel">
    <h3 class="op-section-title">{{ 'COMMON.CODE' | translate }}</h3>
    <app-code-snippet [code]="snippet" language="html"></app-code-snippet>
  </section>
</div>
