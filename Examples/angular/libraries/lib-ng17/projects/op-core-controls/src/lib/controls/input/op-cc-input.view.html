<op-cc-floating-label
  [label]="label"
  [isMandatory]="isMandatory"
  [tooltip]="tooltip"
  [floating]="floating"
  [floatingClass]="floatingClass"
  [labelFor]="id"
>
  <div class="op-cc-input" [ngClass]="[sizeClass, customClass]">
    <input
      pInputText
      [formControl]="control"
      [type]="type"
      [id]="id || null"
      [attr.maxlength]="maxLength"
      [placeholder]="placeholder | translate"
      [readonly]="readonly"
      (input)="onInput($event)"
      (blur)="onBlur($event)"
      (click)="doClick($event)"
    />
  </div>
</op-cc-floating-label>
